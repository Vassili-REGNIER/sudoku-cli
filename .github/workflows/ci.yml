name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting with .clang-format
        run: |
          mapfile -t files < <(git ls-files '*.cpp' '*.h')
          if [ "${#files[@]}" -eq 0 ]; then exit 0; fi
          clang-format --dry-run --Werror "${files[@]}"

  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-13 g++-13 clang-tidy-18 python3

      - name: Configure (compile_commands.json)
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZERS=OFF \
            -DBUILD_TESTING=ON \
            -G Ninja

      - name: Run clang-tidy
        run: ./scripts/run-clang-tidy.sh -j "$(nproc)" -warnings-as-errors='*'

  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        build_type: [Debug, Release]
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - compiler: clang
            cc: clang-17
            cxx: clang++-17

    steps:
      - uses: actions/checkout@v4

      - name: Install compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cc }} ${{ matrix.cxx }}

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DENABLE_SANITIZERS=${{ matrix.build_type == 'Debug' && 'ON' || 'OFF' }} \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --parallel $(nproc)
